# Config-as-code для сервиса Web на Railway.
# В настройках сервиса: путь к файлу → /railway.web.toml
# Плюс RAILPACK_CONFIG_FILE=railpack.web.json (если используете отдельный railpack для web).
#
# Порт: Next.js использует переменную PORT (Railway задаёт автоматически).
# Если задан NEXT_BASE_PATH (например /trade), healthcheckPath должен быть с префиксом:
#   healthcheckPath = "/trade/health"

[build]
builder = "RAILPACK"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
