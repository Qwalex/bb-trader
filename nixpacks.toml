# Только если билдер — Nixpacks (не Railpack). Сейчас Railway по умолчанию — Railpack → см. railpack.json
# Для Web при Nixpacks: NIXPACKS_CONFIG_FILE = nixpacks.web.toml

[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx turbo run build --filter=api"]

[start]
cmd = "npm run start:railway --workspace=api"
