# Только для билдера Nixpacks. На Railway с Railpack используйте railpack.web.json и RAILPACK_CONFIG_FILE.

[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build -w @repo/shared && npm run build -w @repo/api && npm run build -w web",
]

[start]
cmd = "npm run start --workspace=web"
