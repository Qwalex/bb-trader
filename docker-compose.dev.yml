# Стек development: отдельный project name, порты, volume SQLite — не пересекается с production.
# На VPS: отдельный каталог (напр. /root/bb-trader-dev), ветка development, ./restart-dev.sh
name: bb-trader-dev

services:
  api:
    image: ${API_IMAGE:-bb-trade-api:local}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/dev.db
      API_PORT: "3001"
      API_HOST: 0.0.0.0
    volumes:
      - sqlite-data-dev:/app/data
    ports:
      - "127.0.0.1:3011:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: ${WEB_IMAGE:-bb-trade-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_BASE_PATH: ${WEB_NEXT_BASE_PATH:-/trade-dev}
        NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL:-/trade-dev-api}
        API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    restart: unless-stopped
    environment:
      NEXT_BASE_PATH: ${WEB_NEXT_BASE_PATH:-/trade-dev}
      NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL:-/trade-dev-api}
      API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    ports:
      - "127.0.0.1:3013:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/trade-dev || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-viewer:
    image: coleifer/sqlite-web:latest
    restart: unless-stopped
    command:
      [
        "sqlite_web",
        "/data/dev.db",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--url-prefix",
        "/trade-dev-db",
      ]
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - sqlite-data-dev:/data:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlite-data-dev:
