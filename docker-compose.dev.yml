# Стек development: отдельный project name, порты и volumes — не пересекается с production.
# На VPS: отдельный каталог (напр. /root/bb-trader-dev), ветка development, ./restart-dev.sh
name: bb-trader-dev

services:
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data-dev:/var/lib/postgresql/data
      # Analytics (Logflare): БД _supabase и схема _analytics — только при первом init тома.
      # Старый volume без _supabase (ошибка database "_supabase" does not exist):
      #   ./scripts/ensure-analytics-db.sh
      # либо вручную psql как в scripts/ensure-analytics-db.sh, либо пересоздать том supabase-db-data-dev.
      - ./supabase/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:ro
      - ./supabase/volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.177.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${SUPABASE_DB_PASSWORD}@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL},${WEB_ORIGIN}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_DISABLE_SIGNUP: ${SUPABASE_DISABLE_SIGNUP:-false}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SUPABASE_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SUPABASE_SMTP_PORT}
      GOTRUE_SMTP_USER: ${SUPABASE_SMTP_USER}
      GOTRUE_SMTP_PASS: ${SUPABASE_SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SUPABASE_SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: ${SUPABASE_SMTP_SENDER_NAME}
    ports:
      - "127.0.0.1:10099:9999"

  rest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:${SUPABASE_DB_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}

  meta:
    image: supabase/postgres-meta:v0.89.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}

  # Без БД _supabase Logflare падает (FATAL database "_supabase" does not exist), дальше — queue_timeout в пуле и рестарт контейнера.
  analytics:
    image: supabase/logflare:1.31.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "http://localhost:4000/health"]
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 30s
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: db
      DB_PORT: "5432"
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${LOGFLARE_PRIVATE_ACCESS_TOKEN}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${SUPABASE_DB_PASSWORD}@db:5432/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true

  # Не ждём service_healthy у analytics: при отсутствии БД _supabase Logflare не поднимается, и Studio
  # тогда никогда не стартует — ломается весь compose up / деплой. Логи в Studio без Logflare деградируют.
  studio:
    image: ghcr.io/supabase/studio:2026.03.16-sha-5528817
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
      analytics:
        condition: service_started
      kong:
        condition: service_started
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
      # Внутренний Kong (как в официальном docker-compose Supabase). Публичный URL ломает вызовы Auth из Studio (JWT malformed).
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      LOGFLARE_URL: http://analytics:4000
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_PUBLIC_ACCESS_TOKEN}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${LOGFLARE_PRIVATE_ACCESS_TOKEN}
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/edge-functions
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
    volumes:
      - ./supabase/volumes/functions:/app/edge-functions
      - ./supabase/volumes/snippets:/app/snippets
    ports:
      - "127.0.0.1:8082:3000"

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./supabase/kong.dev.yml:/home/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8010:8000"

  api:
    image: ${API_IMAGE:-bb-trade-api:local}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      API_PORT: "3001"
      API_HOST: 0.0.0.0
      STACK_SLUG: ${STACK_SLUG:-trade-dev}
      API_SWAGGER_SERVER: "/${STACK_SLUG:-trade-dev}-api"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3013}
      WEB_CORS_ORIGINS: ${WEB_CORS_ORIGINS:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_SERVICE_ROLE_KEY_SERVER: ${SUPABASE_SERVICE_ROLE_KEY_SERVER}
      BOOTSTRAP_WORKSPACE_ID: ${BOOTSTRAP_WORKSPACE_ID}
    ports:
      - "127.0.0.1:3011:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: ${WEB_IMAGE:-bb-trade-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        STACK_SLUG: ${STACK_SLUG:-trade-dev}
        API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    restart: unless-stopped
    environment:
      STACK_SLUG: ${STACK_SLUG:-trade-dev}
      NEXT_BASE_PATH: "/${STACK_SLUG:-trade-dev}"
      NEXT_PUBLIC_API_URL: "/${STACK_SLUG:-trade-dev}-api"
      API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY_SERVER: ${SUPABASE_SERVICE_ROLE_KEY_SERVER}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "127.0.0.1:3013:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/${STACK_SLUG:-trade-dev} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  supabase-db-data-dev:
