services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/dev.db
      API_PORT: "3001"
      API_HOST: 0.0.0.0
    volumes:
      - sqlite-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_BASE_PATH: ${WEB_NEXT_BASE_PATH:-/trade}
        NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL:-/api}
        API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    restart: unless-stopped
    environment:
      NEXT_BASE_PATH: ${WEB_NEXT_BASE_PATH:-/trade}
      NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL:-/api}
      API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/trade || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sqlite-data:
