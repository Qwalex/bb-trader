services:
  api:
    image: ${API_IMAGE:-bb-trade-api:local}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/dev.db
      API_PORT: "3001"
      API_HOST: 0.0.0.0
      STACK_SLUG: ${STACK_SLUG:-trade}
      API_SWAGGER_SERVER: "/${STACK_SLUG:-trade}-api"
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
    volumes:
      - sqlite-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: ${WEB_IMAGE:-bb-trade-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        STACK_SLUG: ${STACK_SLUG:-trade}
        API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    restart: unless-stopped
    environment:
      STACK_SLUG: ${STACK_SLUG:-trade}
      NEXT_BASE_PATH: "/${STACK_SLUG:-trade}"
      NEXT_PUBLIC_API_URL: "/${STACK_SLUG:-trade}-api"
      API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
      SETTINGS_PAGE_PASSWORD: ${SETTINGS_PAGE_PASSWORD:-}
      NEXT_PUBLIC_API_ACCESS_TOKEN: ${NEXT_PUBLIC_API_ACCESS_TOKEN:-}
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/${STACK_SLUG:-trade} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-viewer:
    image: coleifer/sqlite-web:latest
    restart: unless-stopped
    environment:
      STACK_SLUG: ${STACK_SLUG:-trade}
    command: ["sqlite_web", "/data/dev.db", "--host", "0.0.0.0", "--port", "8080", "--url-prefix", "/${STACK_SLUG:-trade}-db"]
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - sqlite-data:/data:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlite-data:
