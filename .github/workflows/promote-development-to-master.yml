name: Sync branches (manual)

on:
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

concurrency:
  group: sync-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Decide direction (by workflow ref)
        id: dir
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" == "master" ]]; then
            echo "source=development" >> "$GITHUB_OUTPUT"
            echo "target=master" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == "development" ]]; then
            echo "source=master" >> "$GITHUB_OUTPUT"
            echo "target=development" >> "$GITHUB_OUTPUT"
          else
            echo "This workflow must be run using workflow from master or development." >&2
            echo "Got ref: '$REF'" >&2
            exit 1
          fi

      - name: Checkout target branch
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.dir.outputs.target }}
          fetch-depth: 0

      - name: Fetch source branch
        run: |
          set -euo pipefail
          git fetch origin "${{ steps.dir.outputs.source }}":"refs/remotes/origin/${{ steps.dir.outputs.source }}"

      - name: Merge source into target (ff if possible)
        run: |
          set -euo pipefail
          git status --porcelain

          TARGET="${{ steps.dir.outputs.target }}"
          SOURCE="origin/${{ steps.dir.outputs.source }}"

          echo "Target: $TARGET"
          echo "Source: $SOURCE"

          # 1) Пытаемся fast-forward (предпочтительно: без merge-коммита, без конфликтов).
          if git merge --ff-only "$SOURCE"; then
            echo "Fast-forward merge ok."
          else
            echo "Fast-forward невозможен — делаем merge-коммит."
            # 2) Merge-коммит с локальными user.* (не трогаем global git config).
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              merge --no-ff --no-edit "$SOURCE"
          fi

      - name: Push target branch
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ steps.dir.outputs.target }}"

