name: Deploy development to VPS

on:
  push:
    branches: ["development"]
  workflow_run:
    workflows: ["Sync branches (manual)"]
    types: ["completed"]
    branches: ["development"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Docker cleanup (before build)
        run: |
          docker buildx prune -af || true
          docker system prune -af --volumes || true

      - name: Image name (lowercase for GHCR)
        id: meta
        run: echo "lower_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            STACK_SLUG=trade-dev
            API_INTERNAL_URL=http://api:3001
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker cleanup (after build)
        if: always()
        run: |
          docker buildx prune -af || true
          docker system prune -af --volumes || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        run: |
          [ -n "${{ secrets.VPS_HOST }}" ] || { echo "Missing secret: VPS_HOST"; exit 1; }
          [ -n "${{ secrets.VPS_USER }}" ] || { echo "Missing secret: VPS_USER"; exit 1; }
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }

      - name: Image name (lowercase for GHCR)
        id: meta
        run: echo "lower_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Run restart-dev.sh on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -euo pipefail
            DEV_ROOT="${{ secrets.VPS_DEV_PATH }}"
            cd "${DEV_ROOT:-/root/bb-trader-dev}"
            export API_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:dev-${{ github.sha }}
            export WEB_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:dev-${{ github.sha }}
            export PROJECT_NAME="${PROJECT_NAME:-bb-trade-dev}"
            chmod +x ./restart-dev.sh ./restart.sh
            ./restart-dev.sh
