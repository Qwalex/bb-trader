name: Deploy to VPS

on:
  push:
    branches: ["master", "main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker cleanup (before build)
        run: |
          docker buildx prune -af || true
          docker system prune -af --volumes || true

      - name: Image name (lowercase for GHCR)
        id: meta
        run: echo "lower_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            NEXT_BASE_PATH=/trade
            NEXT_PUBLIC_API_URL=/trade-api
            API_INTERNAL_URL=http://api:3001
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker cleanup (after build)
        if: always()
        run: |
          docker buildx prune -af || true
          docker system prune -af --volumes || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        run: |
          [ -n "${{ secrets.VPS_HOST }}" ] || { echo "Missing secret: VPS_HOST"; exit 1; }
          [ -n "${{ secrets.VPS_USER }}" ] || { echo "Missing secret: VPS_USER"; exit 1; }
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }

      - name: Image name (lowercase for GHCR)
        id: meta
        run: echo "lower_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Run restart.sh on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -euo pipefail
            cd /root/bb-trader
            export API_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/api:${{ github.sha }}
            export WEB_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.lower_repo }}/web:${{ github.sha }}
            chmod +x ./restart.sh
            ./restart.sh
