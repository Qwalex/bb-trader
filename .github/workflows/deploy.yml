name: Deploy to VPS
on:
  push:
    branches: [ "master" ]   # или main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Run restart.sh on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/signals-bot
            chmod +x ./restart.sh
            ./restart.sh
