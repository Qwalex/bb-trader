# Стек test: отдельная БД; префикс URL как у dev — trade-test (иначе на одном vhost конфликт с /trade).
# Порты на хосте: 3021 api, 3023 web. Nginx: /trade-test, /trade-test-api.
# Каталог на сервере: например /root/bb-trader-test, ветка test, ./restart-test.sh
name: bb-trader-test

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals_test
    volumes:
      - postgres-data-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-bb-trade-api:local}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://signals:signals@postgres:5432/signals_test?schema=public
      API_PORT: "3001"
      API_HOST: 0.0.0.0
      STACK_SLUG: ${STACK_SLUG:-trade-test}
      API_SWAGGER_SERVER: "/${STACK_SLUG:-trade-test}-api"
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
    ports:
      - "127.0.0.1:3021:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: ${WEB_IMAGE:-bb-trade-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        STACK_SLUG: ${STACK_SLUG:-trade-test}
        API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
    restart: unless-stopped
    environment:
      STACK_SLUG: ${STACK_SLUG:-trade-test}
      NEXT_BASE_PATH: "/${STACK_SLUG:-trade-test}"
      NEXT_PUBLIC_API_URL: "/${STACK_SLUG:-trade-test}-api"
      API_INTERNAL_URL: ${WEB_API_INTERNAL_URL:-http://api:3001}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      SETTINGS_PAGE_PASSWORD: ${SETTINGS_PAGE_PASSWORD:-}
      NEXT_PUBLIC_API_ACCESS_TOKEN: ${NEXT_PUBLIC_API_ACCESS_TOKEN:-}
    ports:
      - "127.0.0.1:3023:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/${STACK_SLUG:-trade-test}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data-test:
